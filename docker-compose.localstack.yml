version: "3.8"

# LocalStack Community — simulates Lambda, S3, EventBridge, IAM locally.
# Database is NOT simulated here; use the real PostgreSQL on :5434.
#
# Start:  docker compose -f docker-compose.localstack.yml up -d
# Stop:   docker compose -f docker-compose.localstack.yml down

services:
  localstack:
    image: localstack/localstack:3.8
    container_name: bixi-localstack
    ports:
      - "4566:4566"       # unified endpoint (all services)
      - "4510-4559:4510-4559"  # Lambda container ports
    environment:
      - SERVICES=s3,lambda,events,iam,logs
      - DEBUG=0
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=ca-central-1
      # Persist state across restarts (optional)
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  localstack-data:
