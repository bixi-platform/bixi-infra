services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: bixi-db
    environment:
      POSTGRES_DB: bixi
      POSTGRES_USER: bixi
      POSTGRES_PASSWORD: bixi
    ports:
      - "5433:5432"
    volumes:
      - bixi-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bixi -d bixi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bixi-data:
